    <!-- Specific styles for the members page -->
    <style>
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .member-card {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            cursor: pointer;
        }
        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            position: relative;
            background: linear-gradient(135deg, var(--bg-secondary), #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            transition: var(--transition-normal);
            overflow: hidden;
        }
        .avatar-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-blue), transparent, var(--neon-green));
            z-index: -1;
            border-radius: 50%;
            animation: spinGlow 4s linear infinite;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }
        @keyframes spinGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .avatar-icon {
            font-size: 3rem;
            color: var(--neon-green);
            transition: var(--transition-normal);
        }
        .member-card:hover .avatar-container {
            transform: scale(1.1);
            box-shadow: 0 0 25px var(--neon-glow-blue);
        }
        .member-card:hover .avatar-container::before {
            opacity: 1;
        }
        .member-card:hover .avatar-icon {
            transform: scale(1.05);
            color: #fff;
            text-shadow: 0 0 10px var(--neon-green);
        }
        .member-name {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 0.5rem;
            transition: var(--transition-normal);
        }
        .member-card:hover .member-name {
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-glow-blue);
        }
        /* SVG Profile fallback icon */
        .svg-icon {
            width: 60px;
            height: 60px;
            fill: none;
            stroke: var(--neon-green);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke var(--transition-normal);
        }
        .member-card:hover .svg-icon {
             stroke: #fff;
             filter: drop-shadow(0 0 5px var(--neon-green));
        }
    </style>
</head>
